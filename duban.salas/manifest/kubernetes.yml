# MINIKUBE FUNCIONA EN CODESPACE | LOCAL
# KUBECTL FUNCIONA DIRECTO EN KILLERCODA (SIN MINIKUBE)

# consultar versión de minikube
minikube version

# consultar si minikube esta en start o stop
minikube status

# iniciar clúster kubernetes
minikube start

# ingresar a la carpeta de los manifiestos de kubernetes (manifest)
cd manifest

# listar namespace
kubectl get namespace
kubectl get ns

# crear un namespace "duban" por comando mediante un archivo: "duban-salas-35-namespace.yml"
kubectl apply -f duban-salas-35-namespace.yml

# consultar namespace en uso por "default" | LINUX
kubectl config view --minify | grep namespace

# consultar namespace en uso por "default" | WINDOWS
kubectl config view --minify | findstr namespace

# cambiar un namespace en uso por "default" a "duban-salas-35-namespace"
kubectl config set-context --current --namespace=duban-salas-35-namespace

# consultar todos los recursos de un namespace "duban-salas-35-namespace"
kubectl get all -n duban-salas-35-namespace

# consultar todos los recursos y secret de un namespace "duban-salas-35-namespace"
kubectl get all,secrets -n duban-salas-35-namespace


# listar services del namespace "duban-salas-35-namespace"
minikube service duban-salas-35-service -n juan-condori-00-namespace
minikube service list

# probar el microservicio dentro del clúster con curl
curl http://192.168.49.2:30001/v1/api/spotify
curl http://192.168.49.2:30001/v1/api/spotify/1
curl http://192.168.49.2:30001/v1/api/youtube
curl http://192.168.49.2:30001/v1/api/youtube/1

# crear un túnel de puerto la máquina local (host) y el clúster de Kubernetes
kubectl port-forward service/duban-salas-35-service 8085:30001