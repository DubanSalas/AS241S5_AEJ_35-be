# kubectl apply -f duban-salas-35-deployment.yml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: duban-salas-35-deployment
  namespace: duban-salas-35-namespace
spec:
  replicas: 3
  selector:
    matchLabels:
      app: duban-salas-35-deployment        # Debe coincidir con las etiquetas del Service
  template:
    metadata:
      labels:
        app: duban-salas-35-deployment      # Debe coincidir con las etiquetas del Service
    spec:
      containers:
      - name: duban-salas-35-container
        image: salasnapandubanalexander/duban-salas-35-be:2.0   # Imagen Docker Hub
        imagePullPolicy: Always
        envFrom:
        - secretRef:
            name: duban-salas-35-secret  # Esto cargará todos los valores como variables de entorno